<!DOCTYPE html>
<html class="staticrypt-html">
<head>
    <meta charset="utf-8"/>
    <title>/*[|template_title|]*/0</title>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHZpZXdCb3g9JzAgMCAxMDAgMTAwJz48dGV4dCB5PScuOWVtJyBmb250LXNpemU9JzkwJz7wn4+gPC90ZXh0Pjwvc3ZnPg==">
    <meta http-equiv="expires" content="0"/>
    <meta http-equiv="pragma" content="no-cache"/>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}

        .staticrypt-html,.staticrypt-body{height:100%}

        .staticrypt-content{
            min-height:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            background: /*[|template_color_secondary|]*/ 0;
            font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
            padding:20px;
        }

        /* ── Sfondo animato ── */
        .staticrypt-content::before{
            content:'';
            position:fixed;
            inset:0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(23,138,90,.35) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(26,173,114,.20) 0%, transparent 55%),
                radial-gradient(ellipse at 60% 80%, rgba(14,86,56,.30) 0%, transparent 60%);
            z-index:0;
            animation: bgPulse 8s ease-in-out infinite alternate;
        }
        @keyframes bgPulse{
            from{opacity:.7}
            to{opacity:1}
        }

        /* ── Card ── */
        .staticrypt-form{
            position:relative;
            z-index:1;
            background:#fff;
            border-radius:20px;
            padding:44px 40px 36px;
            width:100%;
            max-width:400px;
            box-shadow:0 20px 60px rgba(0,0,0,.25), 0 4px 16px rgba(0,0,0,.15);
            animation: slideUp .45s cubic-bezier(.22,.68,0,1.2) both;
        }
        @keyframes slideUp{
            from{opacity:0;transform:translateY(28px)}
            to{opacity:1;transform:translateY(0)}
        }

        /* ── Logo ── */
        .login-logo{
            text-align:center;
            margin-bottom:28px;
        }
        .login-logo-icon{
            width:72px;height:72px;
            background:linear-gradient(135deg,#178a5a,#1aad72);
            border-radius:18px;
            display:inline-flex;
            align-items:center;
            justify-content:center;
            font-size:34px;
            margin-bottom:14px;
            box-shadow:0 8px 24px rgba(23,138,90,.35);
        }
        .login-logo h1{
            font-size:20px;
            font-weight:800;
            color:#1a2e20;
            letter-spacing:-.3px;
            line-height:1.2;
        }
        .login-logo p{
            font-size:12px;
            color:#7a9080;
            margin-top:4px;
        }

        /* ── Divisore ── */
        .login-divider{
            border:none;
            border-top:1px solid #eef2ee;
            margin:0 0 24px;
        }

        /* ── Input ── */
        .staticrypt-password-container{
            position:relative;
            margin-bottom:14px;
        }
        .staticrypt-password-container input[type="password"],
        .staticrypt-password-container input[type="text"]{
            width:100%;
            padding:14px 46px 14px 16px;
            border:2px solid #e0e8e2;
            border-radius:12px;
            font-size:15px;
            color:#1a2e20;
            background:#f8faf8;
            outline:none;
            transition:border-color .2s, box-shadow .2s, background .2s;
        }
        .staticrypt-password-container input:focus{
            border-color:#178a5a;
            background:#fff;
            box-shadow:0 0 0 3px rgba(23,138,90,.12);
        }
        .staticrypt-toggle-password-visibility{
            position:absolute;
            right:14px;
            top:50%;
            transform:translateY(-50%);
            width:20px;height:20px;
            opacity:.45;
            cursor:pointer;
            transition:opacity .15s;
        }
        .staticrypt-toggle-password-visibility:hover{opacity:.75}

        /* ── Remember me ── */
        label.staticrypt-remember{
            display:flex;
            align-items:center;
            gap:10px;
            font-size:13px;
            color:#557060;
            margin-bottom:20px;
            cursor:pointer;
            user-select:none;
        }
        .staticrypt-remember input[type="checkbox"]{
            width:18px;height:18px;
            accent-color:#178a5a;
            cursor:pointer;
        }

        /* ── Bottone ── */
        .staticrypt-decrypt-button{
            width:100%;
            padding:15px;
            background:linear-gradient(135deg,#178a5a,#1aad72);
            color:#fff;
            border:none;
            border-radius:12px;
            font-size:15px;
            font-weight:700;
            letter-spacing:.5px;
            cursor:pointer;
            transition:filter .2s, transform .1s, box-shadow .2s;
            box-shadow:0 4px 16px rgba(23,138,90,.35);
        }
        .staticrypt-decrypt-button:hover{
            filter:brightness(1.07);
            box-shadow:0 6px 22px rgba(23,138,90,.45);
        }
        .staticrypt-decrypt-button:active{
            transform:scale(.98);
        }

        /* ── Spinner ── */
        .staticrypt-spinner-container{
            position:fixed;inset:0;
            display:flex;align-items:center;justify-content:center;
            background: /*[|template_color_secondary|]*/ 0;
            z-index:10;
        }
        .staticrypt-spinner{
            width:42px;height:42px;
            border:4px solid rgba(255,255,255,.2);
            border-top-color:#1aad72;
            border-radius:50%;
            animation:spin .7s linear infinite;
        }
        @keyframes spin{to{transform:rotate(360deg)}}

        .hidden{display:none!important}
    </style>
</head>

            <form id="staticrypt-form" action="#" method="post">
                <div class="staticrypt-password-container">

                        id="staticrypt-password"
                        type="password"
                        name="password"
                        placeholder="/*[|template_placeholder|]*/0"

                <label id="staticrypt-remember-label" class="staticrypt-remember hidden">

                <input type="submit" class="staticrypt-decrypt-button" value="/*[|template_button|]*/0"/>
            </form>

        </div>
    </div>

    <script>
        const staticryptInitiator = /*[|js_staticrypt|]*/ 0;
        const templateError = "/*[|template_error|]*/0",
              templateToggleAltShow = "/*[|template_toggle_show|]*/0",
              templateToggleAltHide = "/*[|template_toggle_hide|]*/0",
              isRememberEnabled = /*[|is_remember_enabled|]*/ 0,
              staticryptConfig = /*[|staticrypt_config|]*/ 0;

        const templateConfig = {
            rememberExpirationKey: "staticrypt_expiration",
            rememberPassphraseKey: "staticrypt_passphrase",
            replaceHtmlCallback: null,
            clearLocalStorageCallback: null,
        };

        const staticrypt = staticryptInitiator.init(staticryptConfig, templateConfig);

        window.onload = async function(){
            try {
                const { isSuccessful } = await staticrypt.handleDecryptOnLoad();
                if(!isSuccessful){
                    document.getElementById("staticrypt_loading").classList.add("hidden");
                    document.getElementById("staticrypt_content").classList.remove("hidden");
                    document.getElementById("staticrypt-password").focus();
                    if(isRememberEnabled)
                        document.getElementById("staticrypt-remember-label").classList.remove("hidden");
                }
            } catch(e) {
                console.error('StaticCrypt load error:', e);
                document.getElementById("staticrypt_loading").classList.add("hidden");
                document.getElementById("staticrypt_content").classList.remove("hidden");
                document.getElementById("staticrypt-password").focus();

        const imgEyeOpen  = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1NzYgNTEyIj48cGF0aCBkPSJNMjg4IDMyYy04MC44IDAtMTQ1LjUgMzYuOC0xOTIuNiA4MC42QzQ4LjYgMTU2IDE3LjMgMjA4IDIuNSAyNDMuN2MtMy4zIDcuOS0zLjMgMTYuNyAwIDI0LjZDMTcuMyAzMDQgNDguNiAzNTYgOTUuNCAzOTkuNEMxNDIuNSA0NDMuMiAyMDcuMiA0ODAgMjg4IDQ4MHMxNDUuNS0zNi44IDE5Mi42LTgwLjZjNDYuOC00My41IDc4LjEtOTUuNCA5My0xMzEuMWMzLjMtNy45IDMuMy0xNi43IDAtMjQuNmMtMTQuOS0zNS43LTQ2LjItODcuNy05My0xMzEuMUM0MzMuNSA2OC44IDM2OC44IDMyIDI4OCAzMnpNMTQ0IDI1NmExNDQgMTQ0IDAgMSAxIDI4OCAwIDE0NCAxNDQgMCAxIDEgLTI4OCAwem0xNDQtNjRjMCAzNS4zLTI4LjcgNjQtNjQgNjRjLTcuMSAwLTEzLjktMS4yLTIwLjMtMy4zYy01LjUtMS44LTExLjkgMS42LTExLjcgNy40Yy4zIDYuOSAxLjMgMTMuOCAzLjIgMjAuN2MxMy43IDUxLjIgNjYuNCA4MS42IDExNy42IDY3LjlzODEuNi02Ni40IDY3LjktMTE3LjZjLTExLjEtNDEuNS00Ny44LTY5LjQtODguNi03MS4xYy01LjgtLjItOS4yIDYuMS03LjQgMTEuN2MyLjEgNi40IDMuMyAxMy4yIDMuMyAyMC4zeiIvPjwvc3ZnPg==";

        toggleIcon.addEventListener("click", function(){
            const pwd = document.getElementById("staticrypt-password");
            if(pwd.type === "password"){
                pwd.type = "text";
                toggleIcon.src = imgEyeOpen;
                toggleIcon.alt = templateToggleAltHide;
                toggleIcon.title = templateToggleAltHide;
            } else {
                pwd.type = "password";
                toggleIcon.src = imgEyeClosed;
                toggleIcon.alt = templateToggleAltShow;
                toggleIcon.title = templateToggleAltShow;
            }
        });

        document.getElementById("staticrypt-form").addEventListener("submit", async function(e){
            e.preventDefault();
            const password = document.getElementById("staticrypt-password").value,
                  isRememberChecked = document.getElementById("staticrypt-remember").checked;
            const { isSuccessful } = await staticrypt.handleDecryptionOfPage(password, isRememberChecked);
            if(!isSuccessful) alert(templateError);
        });
    </script>
</body>
</html>
